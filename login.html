<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log In — Brew-Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/images/B-Logo.png">
<link rel="apple-touch-icon" href="/images/B-Logo.png">
<meta name="theme-color" content="#12100e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:#f5f3ef;min-height:100vh;background:radial-gradient(120% 120% at 0% 0%,#241a12 0%,#12100e 45%,#0e0c0a 100%)}
.page{max-width:560px;margin:0 auto;min-height:100vh;padding:max(22px,env(safe-area-inset-top)) 20px 24px;display:flex;align-items:center}
.card{width:100%;background:linear-gradient(145deg,rgba(184,115,51,.14),rgba(28,25,22,.96));border:1px solid rgba(184,115,51,.38);border-radius:22px;padding:22px;box-shadow:0 20px 44px rgba(0,0,0,.4)}
h1{font-size:28px;font-weight:800;letter-spacing:-.6px;margin-bottom:6px}
.subtitle{font-size:13px;color:rgba(245,243,239,.7);margin-bottom:14px}
.section{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;margin-bottom:10px}
.section h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#e9d5c2;margin-bottom:10px}
label{display:block;font-size:12px;color:#e9d5c2;margin-bottom:6px}
.field{width:100%;height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:#1f1b17;color:#fff;padding:0 11px;margin-bottom:10px}
.field:focus{outline:none;border-color:rgba(184,115,51,.65)}
.btn{width:100%;height:46px;border-radius:11px;border:1px solid #d49a5d;background:linear-gradient(135deg,#9b5f2b,#b87333);color:#fff;font-size:14px;font-weight:800;cursor:pointer}
.btn.alt{background:rgba(184,115,51,.12);color:#f7d8b8;border-color:rgba(184,115,51,.4)}
.msg{min-height:16px;margin-top:10px;font-size:12px;color:#fecaca}
.links{margin-top:12px;display:flex;justify-content:space-between;font-size:12px}
.links a{color:#f7d8b8;text-decoration:none}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;max-width:min(92vw,420px);padding:11px 14px;border-radius:10px;background:rgba(239,68,68,.92);border:1px solid rgba(254,202,202,.45);color:#fff;font-size:12px;font-weight:600;line-height:1.45;box-shadow:0 10px 26px rgba(0,0,0,.35);transition:opacity .2s ease,transform .2s ease;z-index:120}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<main class="page">
  <section class="card">
    <h1>Sign In</h1>
    <p class="subtitle">Use your account or use the staff access code for direct dashboard entry.</p>

    <div class="section">
      <h2>Quick Access Code</h2>
      <label for="accessCode">Access Code</label>
      <input class="field" id="accessCode" type="text" placeholder="Enter access code">
      <button class="btn alt" id="accessBtn" type="button">Enter Dashboard</button>
    </div>

    <div class="section">
      <h2>Email Login</h2>
      <form id="form">
        <label for="email">Email</label>
        <input class="field" id="email" type="email" autocomplete="email" required>
        <label for="password">Password</label>
        <input class="field" id="password" type="password" autocomplete="current-password" required>
        <button class="btn" id="submitBtn" type="submit">Log In</button>
      </form>
    </div>

    <div class="msg" id="msg"></div>
    <div class="links"><a href="/welcome.html">Back</a><a href="/signup.html">Create account</a></div>
  </section>
</main>
<div class="toast" id="toast"></div>

<script type="module">
import { onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { auth } from "./firebase.js";

const ACCESS_CODE = 'BREWS2026!';
const form = document.getElementById('form');
const msg = document.getElementById('msg');
const submitBtn = document.getElementById('submitBtn');
const accessBtn = document.getElementById('accessBtn');
const toast = document.getElementById('toast');
let toastTimer = null;

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => toast.classList.remove('show'), 2800);
}

function explainLoginError(err) {
  const code = err?.code || '';
  if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
    return 'Email or password is incorrect. Please try again.';
  }
  if (code === 'auth/invalid-email') {
    return 'That email address does not look valid.';
  }
  if (code === 'auth/too-many-requests') {
    return 'Too many attempts right now. Please wait a minute and try again.';
  }
  if (code === 'auth/network-request-failed') {
    return 'Could not connect. Check your internet and try again.';
  }
  return 'Could not sign in right now. Please try again.';
}

function grantCodeAccess(name = 'Bar Staff') {
  localStorage.setItem('brew_access_granted', '1');
  localStorage.setItem('brew_access_name', name);
}

function hasCodeAccess() {
  return localStorage.getItem('brew_access_granted') === '1';
}

if (hasCodeAccess()) {
  window.location.href = '/dashboard.html';
}

onAuthStateChanged(auth, (u) => { if (u) window.location.href = '/dashboard.html'; });

accessBtn.addEventListener('click', async () => {
  msg.textContent = '';
  const code = document.getElementById('accessCode').value.trim();
  if (code !== ACCESS_CODE) {
    showToast('That access code is not correct.');
    return;
  }
  grantCodeAccess('Access Code User');
  window.location.href = '/dashboard.html';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  submitBtn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, document.getElementById('email').value.trim(), document.getElementById('password').value);
    grantCodeAccess(document.getElementById('email').value.trim());
    window.location.href = '/dashboard.html';
  } catch (err) {
    showToast(explainLoginError(err));
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
