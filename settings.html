<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brew-Ledger — Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/images/B-Logo.png">
<link rel="apple-touch-icon" href="/images/B-Logo.png">
<meta name="theme-color" content="#12100e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#12100e;--surface:#1c1916;--border:#3a322b;--copper:#b87333;--red:#ef4444}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 120% at 0% 0%,#241a12 0%,var(--bg) 45%,#0e0c0a 100%);color:#f5f3ef;min-height:100vh;padding-bottom:92px}
.header{position:sticky;top:0;z-index:20;background:rgba(18,16,14,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:max(14px,env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;padding:4px;background:linear-gradient(145deg,rgba(184,115,51,.32),rgba(184,115,51,.12));border:1px solid rgba(212,154,93,.45)}
.logo img{width:100%;height:100%;object-fit:contain}
.brand{font-size:17px;font-weight:800;letter-spacing:-.4px}
.main{padding:14px;max-width:760px;margin:0 auto;display:grid;gap:12px}
.card{background:linear-gradient(145deg,rgba(184,115,51,.1),var(--surface));border:1px solid var(--border);border-radius:16px;padding:14px}
.k{font-size:11px;color:rgba(245,243,239,.58);text-transform:uppercase;letter-spacing:.5px}
.v{font-size:16px;font-weight:700;margin-top:4px}
.sep{height:1px;background:rgba(255,255,255,.1);margin:12px 0}
.btn{width:100%;height:46px;border-radius:11px;border:1px solid rgba(239,68,68,.5);background:rgba(239,68,68,.16);color:#fecaca;font-size:14px;font-weight:800}
.small{font-size:12px;color:rgba(245,243,239,.62);line-height:1.5}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(12,10,8,.94);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nav-inner{display:grid;grid-template-columns:repeat(4,1fr);max-width:760px;margin:0 auto}
.nav a{height:60px;text-decoration:none;color:rgba(245,243,239,.56);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.nav a.active{color:#d49a5d}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><img src="/images/B-Logo.png" alt="Brewhemia B logo"></div>
  <div class="brand">Settings</div>
</header>
<main class="main">
  <section class="card">
    <div class="k">Name</div>
    <div class="v" id="name">—</div>
    <div class="sep"></div>
    <div class="k">Email</div>
    <div class="v" id="email">—</div>
    <div class="sep"></div>
    <div class="k">Role</div>
    <div class="v" id="role">—</div>
  </section>

  <section class="card">
    <p class="small">Brew-Ledger is designed for quick end-of-night restock operations: create tasks, replace stock, and leave clear shortage notes for the next shift.</p>
  </section>

  <button class="btn" id="logoutBtn">Log Out</button>
</main>

<nav class="nav">
  <div class="nav-inner">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/record.html">Record Inventory</a>
    <a href="/drinks.html">Drinks List</a>
    <a class="active" href="/settings.html">Settings</a>
  </div>
</nav>

<script type="module">
import { onAuthStateChanged, signInAnonymously, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { auth, db } from "./firebase.js";

function hasCodeAccess() {
  return localStorage.getItem('brew_access_granted') === '1';
}

let recoveringCodeSession = false;

onAuthStateChanged(auth, async (user) => {
  if (!user && !hasCodeAccess()) { window.location.href = '/login.html'; return; }

  if (!user && hasCodeAccess()) {
    if (recoveringCodeSession) return;
    recoveringCodeSession = true;
    try {
      await signInAnonymously(auth);
      return;
    } catch (err) {
      localStorage.removeItem('brew_access_granted');
      localStorage.removeItem('brew_access_name');
      window.location.href = '/login.html';
      return;
    } finally {
      recoveringCodeSession = false;
    }
  }

  let profile;
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    profile = snap.exists() ? snap.data() : { name: user.email, email: user.email, role: 'staff' };
  } else {
    profile = {
      name: localStorage.getItem('brew_access_name') || 'Access Code User',
      email: 'access@brewledger.local',
      role: 'staff'
    };
  }

  document.getElementById('name').textContent = profile.name || user?.email || 'Staff';
  document.getElementById('email').textContent = profile.email || user?.email || 'access@brewledger.local';
  document.getElementById('role').textContent = profile.role || 'staff';
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  localStorage.removeItem('brew_access_granted');
  localStorage.removeItem('brew_access_name');
  await signOut(auth);
  window.location.href = '/welcome.html';
});
</script>
</body>
</html>
