<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brew-Ledger — Drinks List</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/images/B-Logo.png">
<link rel="apple-touch-icon" href="/images/B-Logo.png">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brew-Ledger">
<meta name="theme-color" content="#12100e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#12100e;--surface:#1c1916;--card:#26221d;--border:#3a322b;
  --copper:#b87333;--copper-soft:#d49a5d;
  --nav-h:62px;--nav-space:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px)
}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 120% at 0% 0%,#241a12 0%,var(--bg) 45%,#0e0c0a 100%);color:#f5f3ef;min-height:100vh;padding-bottom:var(--nav-space)}
a,button,input{-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid #f7d8b8;outline-offset:2px}

/* ── Header ── */
.header{position:sticky;top:0;z-index:20;background:rgba(18,16,14,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:max(14px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;padding:4px;background:linear-gradient(145deg,rgba(184,115,51,.32),rgba(184,115,51,.12));border:1px solid rgba(212,154,93,.45);flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:contain}
.brand{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.brand-mark{height:18px;width:auto;max-width:130px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(212,154,93,.28));flex-shrink:1}
.brand-title{font-size:17px;font-weight:800;letter-spacing:-.4px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-meta{display:flex;align-items:center;gap:8px}
.bar-pill{font-size:11px;padding:4px 9px;border-radius:999px;background:rgba(184,115,51,.18);border:1px solid rgba(184,115,51,.38);color:#f7d8b8;white-space:nowrap}
.bar-switch{position:relative;overflow:hidden;height:32px;padding:0 10px;border-radius:9px;border:1px solid rgba(184,115,51,.52);background:linear-gradient(145deg,rgba(184,115,51,.22),rgba(184,115,51,.1));backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 8px 16px rgba(0,0,0,.22);color:#f7d8b8;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease,border-color .2s ease}
.bar-switch::after{content:'';position:absolute;left:8px;right:8px;top:3px;height:40%;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(255,255,255,0));pointer-events:none}

/* ── Main ── */
.main{padding:16px;max-width:760px;margin:0 auto;display:grid;gap:14px}

/* ── Hero ── */
.hero{border-radius:18px;min-height:140px;border:1px solid rgba(212,154,93,.32);background:linear-gradient(165deg,rgba(10,8,6,.28),rgba(10,8,6,.86)),url('/images/Brew-ledger-advert.png') center/cover no-repeat;padding:16px;display:flex;align-items:flex-end}
.hero h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.hero p{margin-top:5px;font-size:13px;color:rgba(245,243,239,.82);line-height:1.4}

/* ── Card ── */
.card{background:linear-gradient(145deg,rgba(184,115,51,.1),var(--surface));border:1px solid var(--border);border-radius:18px;padding:16px}

/* ── Add form ── */
.grid{display:grid;grid-template-columns:1fr 120px;gap:8px}
.field{height:48px;width:100%;padding:0 14px;border-radius:11px;border:1px solid rgba(255,255,255,.14);background:#1f1b17;color:#fff;font-size:16px;font-family:inherit;margin-bottom:10px}
.field::placeholder{color:rgba(255,255,255,.3)}
.field:focus{outline:none;border-color:rgba(184,115,51,.65)}
.btn{position:relative;overflow:hidden;height:48px;border-radius:11px;border:1px solid rgba(212,154,93,.58);background:linear-gradient(145deg,rgba(184,115,51,.35),rgba(184,115,51,.2));backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);box-shadow:inset 0 1px 0 rgba(255,255,255,.26),0 10px 20px rgba(0,0,0,.28);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .15s ease,box-shadow .2s ease,border-color .2s ease,background .2s ease}
.btn::after{content:'';position:absolute;left:10px;right:10px;top:4px;height:40%;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.26),rgba(255,255,255,0));pointer-events:none}
.btn.secondary{margin-top:0;border:1px solid rgba(184,115,51,.52);background:linear-gradient(145deg,rgba(184,115,51,.2),rgba(184,115,51,.1));color:#f7d8b8}

/* ── List ── */
.list{display:grid;gap:8px}
.item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px}
.item .name{flex:1;font-size:14px;font-weight:700;min-width:0}
.item .cat{font-size:11px;color:rgba(245,243,239,.55);margin-top:2px}
.item button{position:relative;overflow:hidden;min-height:44px;padding:0 14px;border-radius:9px;border:1px solid rgba(239,68,68,.5);background:linear-gradient(145deg,rgba(239,68,68,.24),rgba(220,38,38,.12));backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 8px 14px rgba(0,0,0,.24);color:#fecaca;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0;transition:transform .15s ease,box-shadow .2s ease,border-color .2s ease}
.item button::after{content:'';position:absolute;left:8px;right:8px;top:4px;height:38%;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,0));pointer-events:none}
.pill{font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(184,115,51,.18);border:1px solid rgba(184,115,51,.38);color:#f7d8b8;white-space:nowrap;flex-shrink:0}
.msg{margin-top:10px;font-size:13px;min-height:16px;color:#86efac}
.bar-switch:hover,.btn:hover,.item button:hover{border-color:rgba(247,216,184,.86);box-shadow:inset 0 1px 0 rgba(255,255,255,.34),0 14px 24px rgba(0,0,0,.3)}
.bar-switch:active,.btn:active,.item button:active{transform:translateY(1px);box-shadow:inset 0 2px 8px rgba(0,0,0,.24),0 8px 14px rgba(0,0,0,.24)}

/* ── Bottom nav ── */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(10,8,7,.97);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nav-inner{display:flex;max-width:760px;margin:0 auto}
.nav-tab{flex:1;min-width:0;height:var(--nav-h);text-decoration:none;color:rgba(245,243,239,.38);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;transition:color .15s;position:relative;-webkit-tap-highlight-color:transparent}
.nav-tab.active{color:var(--copper-soft)}
.nav-tab svg{display:block;flex-shrink:0}
.nav-tab.active svg{filter:drop-shadow(0 0 6px rgba(212,154,93,.45))}
.nav-tab.active::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:linear-gradient(90deg,transparent,var(--copper),transparent);border-radius:1px}

@media (max-width:420px){
  .grid{grid-template-columns:1fr}
}
@media (max-width:380px){
  .main{padding:12px;gap:10px}
  .hero{min-height:120px}
  .hero h1{font-size:19px}
  .card{padding:12px}
  .item{flex-wrap:wrap;align-items:flex-start}
  .item .name{flex-basis:100%}
  .brand-mark{height:16px;max-width:102px}
  .brand-title{font-size:15px}
  .nav-tab{font-size:8px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><img src="/images/B-Logo.png" alt="Brewhemia B logo"></div>
  <div class="brand">
    <img class="brand-mark" src="/images/brewhemia-title.png" alt="Brewhemia title">
    <span class="brand-title">Drinks List</span>
  </div>
  <div class="header-meta">
    <div class="bar-pill" id="currentBarChip">Bar: —</div>
    <button class="bar-switch" id="switchBarBtn" type="button">Switch</button>
  </div>
</header>

<main class="main">
  <section class="hero">
    <div>
      <h1>Master Drinks</h1>
      <p id="heroBar">Manage the stock list used by autocomplete when staff record inventory.</p>
    </div>
  </section>
  <section class="card">
    <div class="grid">
      <input id="drinkName" class="field" placeholder="Drink name" autocomplete="off">
      <input id="drinkCategory" class="field" placeholder="Category" autocomplete="off">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button id="addBtn" class="btn" style="flex:1;min-width:120px">Add Drink</button>
      <button id="loadMasterBtn" class="btn secondary" style="flex:1;min-width:120px">Load Master List</button>
    </div>
    <div id="message" class="msg"></div>
  </section>
  <section class="card list" id="drinkList"></section>
</main>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-tab" href="/dashboard.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Board
    </a>
    <a class="nav-tab" href="/record.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Record
    </a>
    <a class="nav-tab active" href="/drinks.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Drinks
    </a>
    <a class="nav-tab" href="/summary.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Summary
    </a>
    <a class="nav-tab" href="/analytics">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="6" y="13" width="3" height="5"/><rect x="11" y="9" width="3" height="9"/><rect x="16" y="6" width="3" height="12"/></svg>
      Analytics
    </a>
    <a class="nav-tab" href="/settings.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>
  </div>
</nav>

<script type="module">
import { addDoc, collection, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { db } from "./firebase.js";
import { DEFAULT_BAR, applyBarHeader, ensureBarOrRedirect, normalizeBar } from "./data/barContext.js";
import { ensureBarMigration } from "./data/barMigration.js";

const listEl = document.getElementById('drinkList');
const msgEl = document.getElementById('message');
let currentDrinks = [];
let hasLiveSync = false;
let masterDrinks = [];
let currentBar = null;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;'); }
function hasCodeAccess() { return localStorage.getItem('brew_access_granted') === '1'; }
function byName(a, b) { return (a.name || '').localeCompare(b.name || ''); }

function renderDrinks(drinks, options = {}) {
  const readOnly = options.readOnly === true;
  const sorted = drinks.slice().sort(byName);
  if (!sorted.length) {
    listEl.innerHTML = '<div style="font-size:13px;color:rgba(245,243,239,.55)">No drinks found.</div>';
    return;
  }

  listEl.innerHTML = sorted.map((d) => `
    <div class="item">
      <div class="name">
        ${esc(d.name || '')}
        <div class="cat">${esc(d.category || 'Other')}</div>
      </div>
      ${d._id.startsWith('master-') ? '<span class="pill">Master</span>' : ''}
      ${readOnly || d._id.startsWith('master-') ? '' : `<button data-del="${d._id}">Delete</button>`}
    </div>
  `).join('');
}

function renderMergedList(dbDrinks) {
  const byDrink = new Map();
  masterDrinks.forEach((d) => byDrink.set((d.name || '').toLowerCase(), d));
  dbDrinks.forEach((d) => {
    const key = (d.name || '').toLowerCase();
    if (!key) return;
    const master = byDrink.get(key);
    if (master && String(master._id || '').startsWith('master-')) {
      byDrink.set(key, { ...d, category: master.category || d.category || 'Other' });
      return;
    }
    byDrink.set(key, d);
  });
  renderDrinks(Array.from(byDrink.values()), { readOnly: !hasLiveSync });
}

async function initMasterList() {
  try {
    const mod = await import("./data/barStockList.js");
    const list = typeof mod.getAllMasterDrinks === 'function' ? mod.getAllMasterDrinks() : [];
    masterDrinks = list.map((d, i) => ({ _id: `master-${i}`, ...d }));
  } catch {
    masterDrinks = [];
    msgEl.style.color = '#fcd34d';
    msgEl.textContent = 'Could not load master list file. Live Firebase drinks will still work.';
  }
}

if (!hasCodeAccess()) {
  window.location.href = '/login.html';
} else {
  currentBar = ensureBarOrRedirect(window.location.pathname);
  if (currentBar) {
    await ensureBarMigration(db).catch(() => {});
    await initMasterList();
    applyBarHeader(document.getElementById('currentBarChip'), document.getElementById('switchBarBtn'), currentBar);
    document.getElementById('heroBar').textContent = `Manage drinks for ${currentBar}. This list powers autocomplete for stock requests.`;
    listEl.innerHTML = '<div style="font-size:13px;color:rgba(245,243,239,.55)">Loading drinks list…</div>';

    onSnapshot(collection(db, 'drinks'), (snap) => {
      hasLiveSync = true;
      currentDrinks = snap.docs
        .map((d) => ({ _id: d.id, ...d.data() }))
        .filter((d) => (normalizeBar(d.bar) || DEFAULT_BAR) === currentBar);
      renderMergedList(currentDrinks);
      msgEl.textContent = '';
    }, (err) => {
      hasLiveSync = false;
      currentDrinks = [];
      renderDrinks(masterDrinks, { readOnly: true });
      msgEl.style.color = '#fcd34d';
      if (err?.code === 'permission-denied') {
        msgEl.textContent = 'Live drinks sync is blocked by Firebase rules. Showing master list only.';
        return;
      }
      msgEl.textContent = 'Could not load live drinks from Firebase. Showing master list only.';
    });
  }
}

document.getElementById('addBtn').addEventListener('click', async () => {
  if (!currentBar) return;
  if (!hasLiveSync) {
    msgEl.style.color = '#fcd34d';
    msgEl.textContent = 'Live Firebase access is unavailable, so new drinks cannot be saved right now.';
    return;
  }

  const name = document.getElementById('drinkName').value.trim();
  const category = document.getElementById('drinkCategory').value.trim() || 'Other';
  if (!name) return;
  try {
    await addDoc(collection(db, 'drinks'), { name, category, bar: currentBar, createdAt: new Date().toISOString() });
    document.getElementById('drinkName').value = '';
    document.getElementById('drinkCategory').value = '';
    msgEl.style.color = '#86efac';
    msgEl.textContent = 'Drink added.';
  } catch {
    msgEl.style.color = '#fcd34d';
    msgEl.textContent = 'Could not save this drink to Firebase right now.';
  }
});

document.getElementById('loadMasterBtn').addEventListener('click', async () => {
  if (!currentBar) return;
  if (!hasLiveSync) {
    renderDrinks(masterDrinks, { readOnly: true });
    msgEl.style.color = '#fcd34d';
    msgEl.textContent = 'Showing built-in master list. Connect Firebase write access to save it online.';
    return;
  }

  const master = masterDrinks;
  const existing = new Set(currentDrinks.map((d) => (d.name || '').toLowerCase()));
  const toAdd = master.filter((d) => !existing.has(d.name.toLowerCase()));

  if (!toAdd.length) {
    msgEl.style.color = '#86efac';
    msgEl.textContent = 'Master list already loaded.';
    return;
  }

  try {
    const now = new Date().toISOString();
    for (const drink of toAdd) {
      await addDoc(collection(db, 'drinks'), { name: drink.name, category: drink.category, bar: currentBar, createdAt: now });
    }
    msgEl.style.color = '#86efac';
    msgEl.textContent = `Added ${toAdd.length} drinks to ${currentBar}.`;
  } catch {
    msgEl.style.color = '#fcd34d';
    msgEl.textContent = 'Could not load master list into Firebase right now.';
  }
});

document.addEventListener('click', async (e) => {
  const del = e.target.closest('[data-del]');
  if (!del) return;
  if (!window.confirm('Delete this drink?')) return;
  try {
    await deleteDoc(doc(db, 'drinks', del.getAttribute('data-del')));
  } catch {
    msgEl.style.color = '#fcd34d';
    msgEl.textContent = 'Could not delete this drink right now.';
  }
});
</script>
</body>
</html>
