<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brew-Ledger — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/images/B-Logo.png">
<link rel="apple-touch-icon" href="/images/B-Logo.png">
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Brew-Ledger">
<meta name="theme-color" content="#12100e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#12100e;--surface:#1c1916;--card:#26221d;--border:#3a322b;
  --copper:#b87333;--copper-soft:#d49a5d;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --nav-h:62px;--nav-space:calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px)
}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 120% at 0% 0%,#241a12 0%,var(--bg) 45%,#0e0c0a 100%);color:#f5f3ef;min-height:100vh;padding-bottom:var(--nav-space)}
a,button,input,textarea{-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid #f7d8b8;outline-offset:2px}

/* ── Header ── */
.header{position:sticky;top:0;z-index:20;background:rgba(18,16,14,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:max(14px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;padding:4px;background:linear-gradient(145deg,rgba(184,115,51,.32),rgba(184,115,51,.12));border:1px solid rgba(212,154,93,.45);flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:contain}
.brand{font-size:17px;font-weight:800;letter-spacing:-.4px;flex:1;min-width:0}
.header-meta{display:flex;align-items:center;gap:8px;min-width:0}
.user{font-size:12px;color:rgba(245,243,239,.58);white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis}
.bar-pill{font-size:11px;padding:4px 9px;border-radius:999px;background:rgba(184,115,51,.18);border:1px solid rgba(184,115,51,.38);color:#f7d8b8;white-space:nowrap}
.bar-switch{height:32px;padding:0 10px;border-radius:9px;border:1px solid rgba(184,115,51,.45);background:rgba(184,115,51,.12);color:#f7d8b8;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}

/* ── Main ── */
.main{padding:16px;max-width:760px;margin:0 auto;display:grid;gap:14px}

/* ── Hero ── */
.hero{border-radius:18px;min-height:156px;border:1px solid rgba(212,154,93,.32);background:linear-gradient(165deg,rgba(10,8,6,.28),rgba(10,8,6,.88)),url('/images/app-Brews.png') center/cover no-repeat;padding:16px;display:flex;align-items:flex-end}
.hero h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.hero p{margin-top:5px;font-size:13px;color:rgba(245,243,239,.82);line-height:1.4}

/* ── Panel ── */
.panel{background:linear-gradient(145deg,rgba(184,115,51,.1),var(--surface));border:1px solid var(--border);border-radius:18px;padding:16px}
.panel h2{font-size:15px;font-weight:800;letter-spacing:.2px;margin-bottom:5px}
.panel p{font-size:13px;color:rgba(245,243,239,.66);line-height:1.55}
.view-switch{display:flex;gap:8px;margin-top:12px}
.view-btn{flex:1;min-height:42px;border-radius:10px;border:1px solid rgba(184,115,51,.35);background:rgba(184,115,51,.1);color:#f7d8b8;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.view-btn.active{background:linear-gradient(135deg,#9b5f2b,var(--copper));border-color:#ca8b4f;color:#fff}

/* ── Task list ── */
.task-list{display:grid;gap:12px}
.bar-group{display:grid;gap:12px}
.bar-group-head{font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#f6d7b6}
.task-swipe{position:relative;border-radius:16px;overflow:hidden}
.task-remove-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding:0 20px;background:linear-gradient(135deg,rgba(239,68,68,.82),rgba(185,28,28,.78));color:#fff;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.task-track{position:relative;z-index:1;transition:transform .2s ease;will-change:transform}
.task-track.dragging{transition:none}
.task{background:linear-gradient(145deg,rgba(255,255,255,.02),var(--card));border:1px solid var(--border);border-radius:16px;padding:14px}
.task.red{border-color:rgba(239,68,68,.5);box-shadow:inset 0 0 0 1px rgba(239,68,68,.2)}
.task.amber{border-color:rgba(245,158,11,.5);box-shadow:inset 0 0 0 1px rgba(245,158,11,.18)}
.task.green{border-color:rgba(34,197,94,.5);box-shadow:inset 0 0 0 1px rgba(34,197,94,.18)}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.name-wrap{min-width:0;flex:1}
.name{font-size:16px;font-weight:800;letter-spacing:-.3px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-bar{margin-top:2px;font-size:11px;color:rgba(245,243,239,.56)}
.status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.status.red{background:rgba(239,68,68,.18);color:#fda4af}
.status.amber{background:rgba(245,158,11,.18);color:#fcd34d}
.status.green{background:rgba(34,197,94,.18);color:#86efac}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:9px;text-align:center}
.stat .k{font-size:10px;color:rgba(245,243,239,.52);letter-spacing:.4px;text-transform:uppercase}
.stat .v{font-size:22px;font-weight:800;margin-top:3px;line-height:1}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{min-height:46px;padding:0 14px;border-radius:11px;border:1px solid transparent;font-size:13px;font-weight:700;cursor:pointer;color:#fff;background:#2b261f;font-family:inherit}
.btn.primary{background:linear-gradient(135deg,#9b5f2b,var(--copper));border-color:#ca8b4f}
.btn.soft{background:rgba(184,115,51,.12);border-color:rgba(184,115,51,.35);color:#f7d8b8}
.btn.mini{min-height:44px;padding:0 12px;font-size:12px}

/* ── Inline comment ── */
.comment-row{display:flex;gap:8px;margin-top:10px;align-items:stretch}
.comment-input{flex:1;min-height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:#1f1b17;color:#fff;padding:0 12px;font-family:inherit;font-size:14px}
.comment-input::placeholder{color:rgba(255,255,255,.3)}
.comment-input:focus{outline:none;border-color:rgba(184,115,51,.65)}

/* ── Comments ── */
.comments{margin-top:12px;display:grid;gap:7px}
.comment{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:9px}
.comment .meta{font-size:11px;color:rgba(245,243,239,.5);margin-bottom:3px}
.comment .text{font-size:13px;color:rgba(245,243,239,.88);line-height:1.45;white-space:pre-wrap}

/* ── Empty ── */
.empty{padding:28px 10px;text-align:center;font-size:13px;color:rgba(245,243,239,.52)}

/* ── Confirm toast ── */
.confirm-toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;width:min(94vw,420px);padding:14px 16px;border-radius:14px;background:rgba(20,16,12,.97);border:1px solid rgba(184,115,51,.4);box-shadow:0 16px 36px rgba(0,0,0,.5);transition:opacity .2s ease,transform .2s ease;z-index:120}
.confirm-toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.confirm-text{font-size:14px;font-weight:700;line-height:1.45;color:#fff}
.confirm-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.confirm-btn{min-height:44px;padding:0 16px;border-radius:10px;border:1px solid transparent;background:#2b261f;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-btn.yes{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#fecaca}
.confirm-btn.cancel{background:rgba(184,115,51,.14);border-color:rgba(184,115,51,.4);color:#f7d8b8}

/* ── Toast ── */
.toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px);transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;max-width:min(92vw,420px);padding:12px 16px;border-radius:11px;color:#fff;font-size:13px;font-weight:600;line-height:1.45;box-shadow:0 10px 26px rgba(0,0,0,.35);transition:opacity .2s ease,transform .2s ease;z-index:121}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:rgba(239,68,68,.92);border:1px solid rgba(254,202,202,.45)}
.toast.success{background:rgba(34,197,94,.9);border:1px solid rgba(187,247,208,.45)}

/* ── Bottom nav ── */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(10,8,7,.97);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nav-inner{display:flex;max-width:760px;margin:0 auto}
.nav-tab{flex:1;min-width:0;height:var(--nav-h);text-decoration:none;color:rgba(245,243,239,.38);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;transition:color .15s;position:relative;-webkit-tap-highlight-color:transparent}
.nav-tab.active{color:var(--copper-soft)}
.nav-tab svg{display:block;flex-shrink:0}
.nav-tab.active svg{filter:drop-shadow(0 0 6px rgba(212,154,93,.45))}
.nav-tab.active::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:linear-gradient(90deg,transparent,var(--copper),transparent);border-radius:1px}

@media (max-width:380px){
  .main{padding:12px;gap:10px}
  .hero{min-height:130px}
  .hero h1{font-size:19px}
  .panel{padding:12px}
  .name{font-size:14px}
  .nav-tab{font-size:8px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important}
}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><img src="/images/B-Logo.png" alt="Brewhemia B logo"></div>
  <div class="brand">Dashboard</div>
  <div class="header-meta">
    <div class="user" id="userName">—</div>
    <div class="bar-pill" id="currentBarChip">Bar: —</div>
    <button class="bar-switch" id="switchBarBtn" type="button">Switch</button>
  </div>
</header>

<main class="main">
  <section class="hero">
    <div>
      <h1>Tonight's Restock Board</h1>
      <p id="heroCopy">Track what is missing, what is collected, and what still needs action.</p>

      <button class="view-btn active" id="viewCurrentBtn" type="button">Current Bar</button>
      <button class="view-btn" id="viewAllBtn" type="button">All Bars</button>
    </div>
  </section>
  <section class="task-list" id="taskList"></section>
</main>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-tab active" href="/dashboard.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Board
    </a>
    <a class="nav-tab" href="/record.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>

    <a class="nav-tab" href="/summary.html">

      Summary

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

<div class="confirm-toast" id="removeConfirm" role="alertdialog" aria-live="assertive" aria-label="Remove task confirmation">
  <div class="confirm-text">Remove this task from the board?</div>
  <div class="confirm-actions">
    <button class="confirm-btn cancel" id="removeConfirmCancel" type="button">Cancel</button>
    <button class="confirm-btn yes" id="removeConfirmYes" type="button">Remove</button>
  </div>
</div>
<div class="toast error" id="toast"></div>

<script type="module">
import { collection, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { db } from "./firebase.js";
import {
  BAR_OPTIONS,
  DEFAULT_BAR,
  applyBarHeader,
  ensureBarOrRedirect,
  getBoardMode,
  normalizeBar,
  setBoardMode
} from "./data/barContext.js";
import { ensureBarMigration } from "./data/barMigration.js";

const taskListEl = document.getElementById('taskList');
const userNameEl = document.getElementById('userName');
const heroCopyEl = document.getElementById('heroCopy');
const panelCopyEl = document.getElementById('panelCopy');
const viewCurrentBtn = document.getElementById('viewCurrentBtn');
const viewAllBtn = document.getElementById('viewAllBtn');
const removeConfirmEl = document.getElementById('removeConfirm');
const removeConfirmYesEl = document.getElementById('removeConfirmYes');
const removeConfirmCancelEl = document.getElementById('removeConfirmCancel');
const toastEl = document.getElementById('toast');
let currentProfile = null;
let currentBar = null;
let boardMode = getBoardMode();
let currentTasks = [];
let tasksUnsub = null;
let pendingRemoveTaskId = null;
let toastTimer = null;
let openSwipeEl = null;
let swipeState = null;
const SWIPE_TRIGGER_PX = 72;
const SWIPE_OPEN_PX = 96;
const SWIPE_LOCK_PX = 10;
const SWIPE_VERTICAL_TOLERANCE_PX = 24;

function hasCodeAccess() {
  return localStorage.getItem('brew_access_granted') === '1';
}

function toNum(value, fallback = 0) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function createdAtMs(task) {
  const v = task?.createdAt;
  if (v?.toDate) return v.toDate().getTime();
  const n = new Date(v || 0).getTime();
  return Number.isFinite(n) ? n : 0;
}

function fmtDate(val) {
  if (!val) return '--';
  if (typeof val === 'string') return new Date(val).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (val.toDate) return val.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return '--';
}

function resolveTaskBar(task) {
  return normalizeBar(task?.bar) || DEFAULT_BAR;
}

function normalizeTaskStatus(task) {
  const raw = String(task?.status || '').trim().toLowerCase();
  const needed = Math.max(0, toNum(task?.neededQty, 0));
  const collected = Math.max(0, toNum(task?.replacedQty, 0));
  const outstanding = Math.max(0, toNum(task?.outstandingQty, needed - collected));
  if (raw === 'requested' || raw === 'collected' || raw === 'completed') return raw;
  if (raw === 'active') return collected > 0 ? 'collected' : 'requested';
  if (raw === 'complete') return 'collected';
  if (raw === 'closed') return 'completed';
  if (outstanding <= 0) return 'collected';
  return collected > 0 ? 'collected' : 'requested';
}

function cardClass(status, outstanding) {
  if (outstanding <= 0) return 'green';
  if (status === 'requested') return 'red';
  if (status === 'collected') return 'amber';
  return 'red';
}

function statusLabel(status, outstanding) {
  if (outstanding <= 0) return ['Ready To Complete', 'green'];
  if (status === 'collected') return ['Collected', 'amber'];
  return ['Requested', 'red'];
}

function updateModeButtons() {
  viewCurrentBtn.classList.toggle('active', boardMode === 'current');
  viewAllBtn.classList.toggle('active', boardMode === 'all');
}

function setBoardView(mode) {
  if (!currentBar) return;
  boardMode = setBoardMode(mode);
  updateModeButtons();
  panelCopyEl.textContent = `Current mode: ${boardMode === 'all' ? 'All Bars' : currentBar}. Collect items, then mark completed when fulfilled.`;
  renderTasks(currentTasks);
}

async function collectQty(taskId, delta) {
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const t = snap.data();
    const needed = Math.max(0, Number(t.neededQty || 0));
    const replaced = Math.max(0, Number(t.replacedQty || 0));
    const nextReplaced = Math.min(needed, replaced + delta);
    const outstanding = Math.max(0, needed - nextReplaced);
    tx.update(ref, {
      replacedQty: nextReplaced,
      outstandingQty: outstanding,
      status: nextReplaced > 0 ? 'collected' : 'requested',
      updatedAt: new Date().toISOString()
    });
  });
}

async function completeTask(taskId) {
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const t = snap.data();
    const needed = Math.max(0, Number(t.neededQty || 0));
    const replaced = Math.max(0, Number(t.replacedQty || 0));
    const outstanding = Math.max(0, needed - replaced);
    const isCompleted = outstanding <= 0;
    if (!isCompleted) return;
    tx.update(ref, {
      status: 'completed',
      updatedAt: new Date().toISOString()
    });
  });
}

async function removeTask(taskId) {
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    tx.update(ref, {
      status: 'completed',
      updatedAt: new Date().toISOString()
    });
  });
}

async function saveCommentToTask(taskId, text) {
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const t = snap.data();
    const comments = Array.isArray(t.comments) ? t.comments.slice() : [];
    comments.push({
      text: text.trim(),
      authorName: currentProfile?.name || 'Access Code User',
      authorId: null,
      createdAt: new Date().toISOString()
    });
    tx.update(ref, { comments, updatedAt: new Date().toISOString() });
  });
}

function renderTaskCard(t) {
  const comments = Array.isArray(t.comments) ? t.comments : [];
  const cls = cardClass(t.status, t.outstandingQty);
  const [label, pillCls] = statusLabel(t.status, t.outstandingQty);
  const showCollect = t.outstandingQty > 0;
  const canComplete = t.outstandingQty === 0;
  return `
    <div class="task-swipe" data-task-id="${t._id}">
      <div class="task-remove-bg">Remove</div>
      <article class="task ${cls} task-track" data-task-id="${t._id}">
        <div class="row">
          <div class="name-wrap">
            <div class="name">${escapeHtml(t.drinkName || 'Unknown')}</div>
            <div class="task-bar">${escapeHtml(t.bar || DEFAULT_BAR)}</div>
          </div>
          <span class="status ${pillCls}">${label}</span>
        </div>

        <div class="stats">
          <div class="stat"><div class="k">Needed</div><div class="v">${t.neededQty}</div></div>
          <div class="stat"><div class="k">Collected</div><div class="v">${t.replacedQty}</div></div>
          <div class="stat"><div class="k">Outstanding</div><div class="v">${t.outstandingQty}</div></div>
        </div>

        <div class="actions">
          ${showCollect ? `<button class="btn primary mini" data-collect="1" data-id="${t._id}">+ Collect</button>
          <button class="btn soft mini" data-collect="2" data-id="${t._id}">+2</button>` : ''}
          ${canComplete ? `<button class="btn primary mini" data-complete="1" data-id="${t._id}">Mark Completed</button>` : ''}
          <button class="btn soft mini" data-show-comment="${t._id}">Comment</button>
        </div>

        <div class="comment-row" id="cr-${t._id}" style="display:none">
          <input class="comment-input" type="text" placeholder="Add shortage note…" maxlength="300" autocomplete="off">
          <button class="btn soft mini" data-save-comment="${t._id}">Save</button>
        </div>

        ${comments.length ? `<div class="comments">${comments.slice(-3).reverse().map((c) => `
          <div class="comment">
            <div class="meta">${escapeHtml(c.authorName || 'Staff')} · ${fmtDate(c.createdAt)}</div>
            <div class="text">${escapeHtml(c.text || '')}</div>
          </div>
        `).join('')}</div>` : ''}
      </article>
    </div>
  `;
}

function renderTasks(tasks) {
  currentTasks = tasks.slice();
  const normalized = tasks.map((t) => {
    const neededQty = Math.max(0, toNum(t.neededQty, 0));
    const replacedQty = Math.max(0, toNum(t.replacedQty, 0));
    const outstandingQty = Math.max(0, toNum(t.outstandingQty, neededQty - replacedQty));
    return {
      ...t,
      bar: resolveTaskBar(t),
      status: normalizeTaskStatus(t),
      neededQty,
      replacedQty,
      outstandingQty
    };
  });

  const openTasks = normalized.filter((t) => t.status !== 'completed');
  const sortByRecent = (a, b) => createdAtMs(b) - createdAtMs(a);

  if (boardMode === 'current') {
    const currentTasksOnly = openTasks.filter((t) => t.bar === currentBar).sort(sortByRecent);
    if (!currentTasksOnly.length) {
      taskListEl.innerHTML = `<div class="panel empty">No open restock tasks for ${escapeHtml(currentBar)} right now.</div>`;
      openSwipeEl = null;
      return;
    }
    taskListEl.innerHTML = currentTasksOnly.map((t) => renderTaskCard(t)).join('');
    openSwipeEl = null;
    return;
  }

  const grouped = BAR_OPTIONS
    .map((bar) => ({ bar, items: openTasks.filter((t) => t.bar === bar).sort(sortByRecent) }))
    .filter((group) => group.items.length);

  if (!grouped.length) {
    taskListEl.innerHTML = '<div class="panel empty">No open restock tasks across bars right now.</div>';
    openSwipeEl = null;
    return;
  }

  taskListEl.innerHTML = grouped.map((group) => `
    <section class="bar-group">
      <div class="bar-group-head">${escapeHtml(group.bar)}</div>
      ${group.items.map((t) => renderTaskCard(t)).join('')}
    </section>
  `).join('');
  openSwipeEl = null;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showToast(message, type = 'error') {
  if (!toastEl) return;
  toastEl.textContent = message;
  toastEl.classList.remove('error', 'success');
  toastEl.classList.add(type);
  toastEl.classList.add('show');
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function resetSwipe(trackEl) {
  if (!trackEl) return;
  trackEl.classList.remove('dragging');
  trackEl.style.transform = '';
  const container = trackEl.closest('.task-swipe');
  if (container) container.classList.remove('open');
}

function closeOpenSwipe() {
  if (!openSwipeEl) return;
  const trackEl = openSwipeEl.querySelector('.task-track');
  resetSwipe(trackEl);
  openSwipeEl = null;
}

function openSwipe(container) {
  if (!container) return;
  if (openSwipeEl && openSwipeEl !== container) closeOpenSwipe();
  const trackEl = container.querySelector('.task-track');
  if (!trackEl) return;
  container.classList.add('open');
  trackEl.classList.remove('dragging');
  trackEl.style.transform = `translateX(-${SWIPE_OPEN_PX}px)`;
  openSwipeEl = container;
}

function openRemoveConfirm(taskId) {
  pendingRemoveTaskId = taskId;
  removeConfirmEl?.classList.add('show');
}

function closeRemoveConfirm() {
  pendingRemoveTaskId = null;
  removeConfirmEl?.classList.remove('show');
  closeOpenSwipe();
}

taskListEl.addEventListener('touchstart', (e) => {
  if (pendingRemoveTaskId) return;
  if (e.touches.length !== 1) return;
  const trackEl = e.target.closest('.task-track');
  if (!trackEl || !taskListEl.contains(trackEl)) return;

  const touch = e.touches[0];
  swipeState = {
    trackEl,
    containerEl: trackEl.closest('.task-swipe'),
    startX: touch.clientX,
    startY: touch.clientY,
    dx: 0,
    dy: 0,
    locked: false,
    cancelled: false
  };
}, { passive: true });

taskListEl.addEventListener('touchmove', (e) => {
  if (!swipeState || swipeState.cancelled) return;
  if (e.touches.length !== 1) return;
  const touch = e.touches[0];
  swipeState.dx = touch.clientX - swipeState.startX;
  swipeState.dy = touch.clientY - swipeState.startY;
  const absX = Math.abs(swipeState.dx);
  const absY = Math.abs(swipeState.dy);

  if (!swipeState.locked) {
    if (absY > absX && absY > SWIPE_LOCK_PX) {
      swipeState.cancelled = true;
      return;
    }
    if (absX < SWIPE_LOCK_PX) return;
    if (swipeState.dy > SWIPE_VERTICAL_TOLERANCE_PX || swipeState.dy < -SWIPE_VERTICAL_TOLERANCE_PX) {
      swipeState.cancelled = true;
      return;
    }
    swipeState.locked = true;
  }

  const clamped = Math.max(-SWIPE_OPEN_PX * 1.35, Math.min(0, swipeState.dx));
  swipeState.trackEl.classList.add('dragging');
  swipeState.trackEl.style.transform = `translateX(${clamped}px)`;
  e.preventDefault();
}, { passive: false });

function finishSwipe() {
  if (!swipeState) return;
  const { trackEl, containerEl, dx, locked, cancelled } = swipeState;
  swipeState = null;
  if (!trackEl || !containerEl || cancelled || !locked) {
    resetSwipe(trackEl);
    return;
  }

  if (dx <= -SWIPE_TRIGGER_PX) {
    openSwipe(containerEl);
    openRemoveConfirm(containerEl.getAttribute('data-task-id'));
    return;
  }

  resetSwipe(trackEl);
  if (openSwipeEl === containerEl) openSwipeEl = null;
}

taskListEl.addEventListener('touchend', finishSwipe, { passive: true });
taskListEl.addEventListener('touchcancel', finishSwipe, { passive: true });

removeConfirmCancelEl?.addEventListener('click', () => {
  closeRemoveConfirm();
});

removeConfirmYesEl?.addEventListener('click', async () => {
  const taskId = pendingRemoveTaskId;
  if (!taskId) return;
  removeConfirmYesEl.disabled = true;
  removeConfirmCancelEl.disabled = true;
  try {
    await removeTask(taskId);
    closeRemoveConfirm();
    showToast('Task removed.', 'success');
  } catch {
    showToast('Could not remove this task right now.');
  } finally {
    removeConfirmYesEl.disabled = false;
    removeConfirmCancelEl.disabled = false;
  }
});

document.addEventListener('click', async (e) => {
  const collect = e.target.closest('[data-collect]');
  if (collect) {
    const taskId = collect.getAttribute('data-id');
    const delta = Number(collect.getAttribute('data-collect') || 1);
    collect.disabled = true;
    try { await collectQty(taskId, delta); } finally { collect.disabled = false; }
    return;
  }

  const showComment = e.target.closest('[data-show-comment]');
  if (showComment) {
    const id = showComment.getAttribute('data-show-comment');
    const row = document.getElementById(`cr-${id}`);
    if (row) {
      const visible = row.style.display !== 'none';
      row.style.display = visible ? 'none' : 'flex';
      if (!visible) row.querySelector('input')?.focus();
    }
    return;
  }

  const saveComment = e.target.closest('[data-save-comment]');
  if (saveComment) {
    const id = saveComment.getAttribute('data-save-comment');
    const row = document.getElementById(`cr-${id}`);
    const input = row?.querySelector('input');
    const text = input?.value?.trim();
    if (!text) return;
    saveComment.disabled = true;
    try {
      await saveCommentToTask(id, text);
      if (input) input.value = '';
      if (row) row.style.display = 'none';
    } catch {
      showToast('Could not save comment right now.');
    } finally {
      saveComment.disabled = false;
    }
    return;
  }

  const complete = e.target.closest('[data-complete]');
  if (complete) {
    const taskId = complete.getAttribute('data-id');
    complete.disabled = true;
    try { await completeTask(taskId); } finally { complete.disabled = false; }
  }
});

viewCurrentBtn.addEventListener('click', () => setBoardView('current'));
viewAllBtn.addEventListener('click', () => setBoardView('all'));

if (!hasCodeAccess()) {
  window.location.href = '/login.html';
} else {
  currentBar = ensureBarOrRedirect(window.location.pathname);
  if (currentBar) {
    await ensureBarMigration(db).catch(() => {});
    applyBarHeader(document.getElementById('currentBarChip'), document.getElementById('switchBarBtn'), currentBar);
    heroCopyEl.textContent = `Track requests for ${currentBar}, or switch to all-bars mode for stock-room collection.`;
    panelCopyEl.textContent = `Current mode: ${boardMode === 'all' ? 'All Bars' : currentBar}. Collect items, then mark completed when fulfilled.`;
    updateModeButtons();

    currentProfile = { name: localStorage.getItem('brew_access_name') || 'Access Code User', email: 'access@brewledger.local' };
    userNameEl.textContent = currentProfile.name || currentProfile.email || 'Staff';

    if (tasksUnsub) tasksUnsub();
    tasksUnsub = onSnapshot(collection(db, 'restock_tasks'), (snap) => {
      const tasks = snap.docs.map((d) => ({ _id: d.id, ...d.data() }));
      renderTasks(tasks);
    }, () => {
      taskListEl.innerHTML = '<div class="panel empty">Could not load tasks right now.</div>';
    });
  }
}
</script>
</body>
</html>
