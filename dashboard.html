<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brew-Ledger — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/images/B-Logo.png">
<link rel="apple-touch-icon" href="/images/B-Logo.png">
<meta name="theme-color" content="#12100e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#12100e;--surface:#1c1916;--card:#26221d;--border:#3a322b;--copper:#b87333;--copper-soft:#d49a5d;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--nav-h:60px;--nav-space:calc(var(--nav-h) + env(safe-area-inset-bottom) + 12px)}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 120% at 0% 0%,#241a12 0%,var(--bg) 45%,#0e0c0a 100%);color:#f5f3ef;min-height:100vh;padding-bottom:var(--nav-space)}
.header{position:sticky;top:0;z-index:20;background:rgba(18,16,14,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:max(14px,env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:10px;padding:4px;background:linear-gradient(145deg,rgba(184,115,51,.32),rgba(184,115,51,.12));border:1px solid rgba(212,154,93,.45)}
.logo img{width:100%;height:100%;object-fit:contain}
.brand{font-size:17px;font-weight:800;letter-spacing:-.4px}
.user{margin-left:auto;font-size:12px;color:rgba(245,243,239,.65)}
.main{padding:14px;max-width:760px;margin:0 auto;display:grid;gap:12px}
.hero{border-radius:16px;min-height:140px;border:1px solid rgba(212,154,93,.32);background:linear-gradient(165deg,rgba(10,8,6,.35),rgba(10,8,6,.86)),url('/images/app-Brews.png') center/cover no-repeat;padding:14px;display:flex;align-items:flex-end}
.hero h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.hero p{margin-top:4px;font-size:12px;color:rgba(245,243,239,.82)}
.panel{background:linear-gradient(145deg,rgba(184,115,51,.1),var(--surface));border:1px solid var(--border);border-radius:16px;padding:14px}
.panel h2{font-size:15px;font-weight:800;letter-spacing:.2px;margin-bottom:4px}
.panel p{font-size:12px;color:rgba(245,243,239,.66);line-height:1.5}
.task-list{display:grid;gap:10px}
.task{background:linear-gradient(145deg,rgba(255,255,255,.02),var(--card));border:1px solid var(--border);border-radius:14px;padding:12px}
.task.red{border-color:rgba(239,68,68,.48);box-shadow:inset 0 0 0 1px rgba(239,68,68,.25)}
.task.amber{border-color:rgba(245,158,11,.48);box-shadow:inset 0 0 0 1px rgba(245,158,11,.2)}
.task.green{border-color:rgba(34,197,94,.48);box-shadow:inset 0 0 0 1px rgba(34,197,94,.2)}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.name{font-size:15px;font-weight:800;letter-spacing:-.2px}
.status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
.status.red{background:rgba(239,68,68,.18);color:#fda4af}
.status.amber{background:rgba(245,158,11,.18);color:#fcd34d}
.status.green{background:rgba(34,197,94,.18);color:#86efac}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:8px;text-align:center}
.stat .k{font-size:11px;color:rgba(245,243,239,.62)}
.stat .v{font-size:20px;font-weight:800;margin-top:2px}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{min-height:44px;padding:0 12px;border-radius:10px;border:1px solid transparent;font-size:13px;font-weight:700;cursor:pointer;color:#fff;background:#2b261f}
.btn.primary{background:linear-gradient(135deg,#9b5f2b,var(--copper));border-color:#ca8b4f}
.btn.soft{background:rgba(184,115,51,.12);border-color:rgba(184,115,51,.35);color:#f7d8b8}
.btn.mini{min-height:44px;padding:0 10px;font-size:12px}
.comments{margin-top:10px;display:grid;gap:7px}
.comment{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px}
.comment .meta{font-size:11px;color:rgba(245,243,239,.58);margin-bottom:2px}
.comment .text{font-size:12px;color:rgba(245,243,239,.88);line-height:1.45;white-space:pre-wrap}
.empty{padding:24px 10px;text-align:center;font-size:13px;color:rgba(245,243,239,.62)}
.nav{position:fixed;left:0;right:0;bottom:0;z-index:25;background:rgba(12,10,8,.94);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nav-inner{display:grid;grid-template-columns:repeat(4,1fr);max-width:760px;margin:0 auto}
.nav a{height:var(--nav-h);text-decoration:none;color:rgba(245,243,239,.56);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.nav a.active{color:var(--copper-soft)}
@media (max-width:380px){
  .main{padding:12px}
  .hero h1{font-size:18px}
  .panel{padding:12px}
  .stats{grid-template-columns:1fr}
  .nav a{font-size:10px;letter-spacing:.15px;text-transform:none}
}
</style>
</head>
<body>
<header class="header">
  <div class="logo"><img src="/images/B-Logo.png" alt="Brewhemia B logo"></div>
  <div class="brand">Dashboard</div>
  <div class="user" id="userName">—</div>
</header>

<main class="main">
  <section class="hero">
    <div>
      <h1>Tonight's Restock Board</h1>
      <p>Track what is missing, what is replaced, and what still needs action.</p>
    </div>
  </section>
  <section class="panel">
    <h2>Outstanding Restock Tasks</h2>
    <p>Live tasks shared across the team. Replace bottles and log shortage notes in real time.</p>
  </section>
  <section class="task-list" id="taskList"></section>
</main>

<nav class="nav">
  <div class="nav-inner">
    <a class="active" href="/dashboard.html">Dashboard</a>
    <a href="/record.html">Record</a>
    <a href="/drinks.html">Drinks</a>
    <a href="/settings.html">Settings</a>
  </div>
</nav>

<script type="module">
import { collection, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { db } from "./firebase.js";

const taskListEl = document.getElementById('taskList');
const userNameEl = document.getElementById('userName');
let currentProfile = null;
let tasksUnsub = null;

function hasCodeAccess() {
  return localStorage.getItem('brew_access_granted') === '1';
}

function fmtDate(val) {
  if (!val) return '--';
  if (typeof val === 'string') return new Date(val).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (val.toDate) return val.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return '--';
}

function cardClass(needed, replaced, outstanding) {
  if (outstanding <= 0) return 'green';
  if (replaced > 0 && replaced < needed) return 'amber';
  return 'red';
}

function statusLabel(needed, replaced, outstanding) {
  if (outstanding <= 0) return ['Completed', 'green'];
  if (replaced > 0 && replaced < needed) return ['Partially Replaced', 'amber'];
  return ['Shortage', 'red'];
}

async function replaceQty(taskId, delta) {
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const t = snap.data();
    const needed = Math.max(0, Number(t.neededQty || 0));
    const replaced = Math.max(0, Number(t.replacedQty || 0));
    const nextReplaced = Math.min(needed, replaced + delta);
    const outstanding = Math.max(0, needed - nextReplaced);
    tx.update(ref, {
      replacedQty: nextReplaced,
      outstandingQty: outstanding,
      status: outstanding === 0 ? 'complete' : 'active',
      updatedAt: new Date().toISOString()
    });
  });
}

async function closeTask(taskId) {
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const t = snap.data();
    const needed = Math.max(0, Number(t.neededQty || 0));
    const replaced = Math.max(0, Number(t.replacedQty || 0));
    const outstanding = Math.max(0, needed - replaced);
    const isCompleted = outstanding <= 0 || t.status === 'complete';
    if (!isCompleted) return;
    tx.update(ref, {
      status: 'closed',
      updatedAt: new Date().toISOString()
    });
  });
}

async function addComment(taskId) {
  const text = window.prompt('Add comment about shortage or issue:');
  if (!text || !text.trim()) return;
  const ref = doc(db, 'restock_tasks', taskId);
  await runTransaction(db, async (tx) => {
    const snap = await tx.get(ref);
    if (!snap.exists()) return;
    const t = snap.data();
    const comments = Array.isArray(t.comments) ? t.comments.slice() : [];
    comments.push({
      text: text.trim(),
      authorName: currentProfile?.name || 'Access Code User',
      authorId: null,
      createdAt: new Date().toISOString()
    });
    tx.update(ref, { comments, updatedAt: new Date().toISOString() });
  });
}

function renderTasks(tasks) {
  const visibleTasks = tasks.filter((t) => t.status !== 'closed');
  const sorted = visibleTasks.slice().sort((a, b) => {
    const av = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : new Date(a.createdAt || 0).getTime();
    const bv = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt || 0).getTime();
    return bv - av;
  });

  if (sorted.length === 0) {
    taskListEl.innerHTML = '<div class="panel empty">No open restock tasks. Completed tasks can be closed one by one.</div>';
    return;
  }

  taskListEl.innerHTML = sorted.map((t) => {
    const needed = Math.max(0, Number(t.neededQty || 0));
    const replaced = Math.max(0, Number(t.replacedQty || 0));
    const outstanding = Math.max(0, needed - replaced);
    const isCompleted = outstanding <= 0 || t.status === 'complete';
    const cls = cardClass(needed, replaced, outstanding);
    const [label, pillCls] = statusLabel(needed, replaced, outstanding);
    const comments = Array.isArray(t.comments) ? t.comments : [];

    return `
      <article class="task ${cls}">
        <div class="row">
          <div class="name">${escapeHtml(t.drinkName || 'Unknown')}</div>
          <span class="status ${pillCls}">${label}</span>
        </div>

        <div class="stats">
          <div class="stat"><div class="k">Needed</div><div class="v">${needed}</div></div>
          <div class="stat"><div class="k">Replaced</div><div class="v">${replaced}</div></div>
          <div class="stat"><div class="k">Outstanding</div><div class="v">${outstanding}</div></div>
        </div>

        <div class="actions">
          ${!isCompleted ? `<button class="btn primary mini" data-replace="1" data-id="${t._id}">+ Replace Bottle</button>
          <button class="btn soft mini" data-replace="2" data-id="${t._id}">+2 Bottles</button>` : ''}
          ${isCompleted ? `<button class="btn primary mini" data-close="1" data-id="${t._id}">Close Task</button>` : ''}
          <button class="btn soft mini" data-comment="1" data-id="${t._id}">Add Comment</button>
        </div>

        ${comments.length ? `<div class="comments">${comments.slice(-3).reverse().map((c) => `
          <div class="comment">
            <div class="meta">Comment by ${escapeHtml(c.authorName || 'Staff')} - ${fmtDate(c.createdAt)}</div>
            <div class="text">${escapeHtml(c.text || '')}</div>
          </div>
        `).join('')}</div>` : ''}
      </article>
    `;
  }).join('');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.addEventListener('click', async (e) => {
  const replace = e.target.closest('[data-replace]');
  if (replace) {
    const taskId = replace.getAttribute('data-id');
    const delta = Number(replace.getAttribute('data-replace') || 1);
    replace.disabled = true;
    try { await replaceQty(taskId, delta); } finally { replace.disabled = false; }
    return;
  }

  const comment = e.target.closest('[data-comment]');
  if (comment) {
    const taskId = comment.getAttribute('data-id');
    await addComment(taskId);
    return;
  }

  const close = e.target.closest('[data-close]');
  if (close) {
    const taskId = close.getAttribute('data-id');
    close.disabled = true;
    try { await closeTask(taskId); } finally { close.disabled = false; }
  }
});

if (!hasCodeAccess()) {
  window.location.href = '/login.html';
} else {
  currentProfile = { name: localStorage.getItem('brew_access_name') || 'Access Code User', email: 'access@brewledger.local' };
  userNameEl.textContent = currentProfile.name || currentProfile.email || 'Staff';

  if (tasksUnsub) tasksUnsub();
  tasksUnsub = onSnapshot(collection(db, 'restock_tasks'), (snap) => {
    const tasks = snap.docs.map((d) => ({ _id: d.id, ...d.data() }));
    renderTasks(tasks);
  }, () => {
    taskListEl.innerHTML = '<div class="panel empty">Could not load tasks right now.</div>';
  });
}
</script>
</body>
</html>
