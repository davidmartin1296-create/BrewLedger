<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome — Brew-Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" type="image/png" href="/images/B-Logo.png">
<link rel="apple-touch-icon" href="/images/B-Logo.png">
<meta name="theme-color" content="#12100e">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:#f5f3ef;min-height:100vh;background:radial-gradient(120% 120% at 0% 0%,#241a12 0%,#12100e 45%,#0e0c0a 100%)}
.page{max-width:560px;margin:0 auto;min-height:100vh;min-height:100svh;min-height:100dvh;padding:max(24px,env(safe-area-inset-top)) 20px 24px;display:flex;align-items:center}
.card{width:100%;background:linear-gradient(145deg,rgba(184,115,51,.12),rgba(28,25,22,.94));border:1px solid rgba(184,115,51,.34);border-radius:22px;padding:24px;box-shadow:0 20px 46px rgba(0,0,0,.42)}
.hero{height:140px;border-radius:16px;margin-bottom:14px;background:linear-gradient(160deg,rgba(10,8,6,.3),rgba(10,8,6,.8)),url('/images/Hero-image.png') center/cover no-repeat;border:1px solid rgba(212,154,93,.35);display:flex;align-items:flex-end;padding:12px}
.hero-txt{font-size:12px;font-weight:700;letter-spacing:.4px;color:#f7d8b8}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo{width:40px;height:40px;border-radius:11px;padding:4px;background:linear-gradient(145deg,rgba(184,115,51,.3),rgba(184,115,51,.12));border:1px solid rgba(212,154,93,.45)}
.logo img{width:100%;height:100%;object-fit:contain}
.name{font-size:22px;font-weight:800;letter-spacing:-.5px}
.subtitle{font-size:14px;color:#e7ceb5;margin-bottom:14px}
.desc{font-size:14px;line-height:1.6;color:rgba(245,243,239,.82);margin-bottom:18px}
.btns{display:grid;gap:10px}
.btn{height:48px;border-radius:12px;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.btn.primary{background:linear-gradient(135deg,#9b5f2b,#b87333);border:1px solid #d49a5d;color:#fff}
.btn.ghost{border:1px solid rgba(184,115,51,.46);background:rgba(184,115,51,.1);color:#f7d8b8}
.quick{margin-top:16px;padding-top:14px;border-top:1px solid rgba(212,154,93,.25)}
.quick-title{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#e7ceb5;margin-bottom:8px}
.quick-row{display:grid;grid-template-columns:1fr auto;gap:8px}
.field{height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:#1f1b17;color:#fff;padding:0 11px;text-transform:uppercase;letter-spacing:.6px}
.field:focus{outline:none;border-color:rgba(184,115,51,.65)}
.btn.quick-btn{height:44px;padding:0 14px;border:1px solid rgba(184,115,51,.46);background:rgba(184,115,51,.12);color:#f7d8b8;cursor:pointer}
.toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;max-width:min(92vw,420px);padding:11px 14px;border-radius:10px;background:rgba(239,68,68,.92);border:1px solid rgba(254,202,202,.45);color:#fff;font-size:12px;font-weight:600;line-height:1.45;box-shadow:0 10px 26px rgba(0,0,0,.35);transition:opacity .2s ease,transform .2s ease;z-index:120}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (max-width:380px){
  .page{padding:16px 14px 20px}
  .card{padding:16px}
  .name{font-size:19px}
  .quick-row{grid-template-columns:1fr}
  .btn.quick-btn{width:100%}
}
</style>
</head>
<body>
<main class="page">
  <section class="card">
    <div class="hero"><div class="hero-txt">End-of-night restock in seconds</div></div>
    <div class="brand">
      <div class="logo"><img src="/images/B-Logo.png" alt="Brewhemia B logo"></div>
      <div class="name">BREW-LEDGER</div>
    </div>
    <div class="subtitle">Smart bar restock tracking</div>
    <p class="desc">Brew-Ledger helps bar teams quickly record drinks that need restocking and track what still needs to be replaced from storage.</p>
    <div class="btns">
      <a class="btn primary" href="/login.html">Log In</a>
      <a class="btn ghost" href="/signup.html">Create New Account</a>
    </div>
    <div class="quick">
      <div class="quick-title">Quick Staff Access</div>
      <div class="quick-row">
        <input class="field" id="quickCode" type="text" placeholder="BREWS2026!" autocapitalize="characters" autocorrect="off" spellcheck="false" inputmode="text">
        <button class="btn quick-btn" id="quickBtn" type="button">Enter Dashboard</button>
      </div>
    </div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
const ACCESS_CODE = 'BREWS2026!';
const quickCodeInput = document.getElementById('quickCode');
const quickBtn = document.getElementById('quickBtn');
const toast = document.getElementById('toast');
let toastTimer = null;

function hasCodeAccess() {
  return localStorage.getItem('brew_access_granted') === '1';
}

function grantCodeAccess(name = 'Bar Staff') {
  localStorage.setItem('brew_access_granted', '1');
  localStorage.setItem('brew_access_name', name);
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add('show');
  window.clearTimeout(toastTimer);
  toastTimer = window.setTimeout(() => toast.classList.remove('show'), 2800);
}

function submitQuickAccess() {
  const code = quickCodeInput.value.trim().toUpperCase();
  quickCodeInput.value = code;
  if (code !== ACCESS_CODE) {
    showToast('That access code is not correct.');
    return;
  }
  grantCodeAccess('Access Code User');
  window.location.href = '/dashboard.html';
}

if (hasCodeAccess()) {
  window.location.href = '/dashboard.html';
}

quickCodeInput.addEventListener('input', () => {
  quickCodeInput.value = quickCodeInput.value.toUpperCase();
});

quickCodeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    submitQuickAccess();
  }
});

quickBtn.addEventListener('click', submitQuickAccess);
</script>
</body>
</html>
